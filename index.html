<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Notepad</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathquill@0.10.1-a/build/mathquill.css">
  <script src="https://cdn.jsdelivr.net/npm/mathquill@0.10.1-a/build/mathquill.min.js"></script>
  <script>
  MathJax = {
    tex: {
      displayMath: [['\\[', '\\]']],
      inlineMath:  [['\\(', '\\)']],
    },
    startup: { typeset: false },
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="projects-panel">
    <div class="projects-header">
      <span>Projects</span>
      <div class="projects-header-actions">
        <button id="new-project-btn" title="New project">+ New</button>
        <button id="close-projects-btn">×</button>
      </div>
    </div>
    <div id="projects-list"></div>
  </div>
  <div id="projects-overlay"></div>

  <div id="app">
    <div id="left-panel">
      <div class="panel-header">
        <div class="header-left">
          <button id="projects-btn" title="Projects">☰</button>
          <span id="project-title-label">Untitled</span>
        </div>
        <div class="header-right">
          <button id="save-btn">Save</button>
          <button id="download-btn">Download</button>
        </div>
      </div>
      <div id="latex-wrapper">
        <div id="line-numbers" aria-hidden="true"></div>
        <div id="latex-source-container">
          <div id="source-line-highlight" aria-hidden="true"></div>
          <textarea id="latex-source" spellcheck="false"></textarea>
        </div>
      </div>
    </div>
    <div id="divider"></div>
    <div id="right-panel">
      <div class="panel-header">
        <span id="right-panel-title">Equations</span>
        <div class="toolbar" id="normal-toolbar">
          <div id="default-type-toggle">
            <button id="default-math-btn" class="type-seg active">Math</button><button id="default-text-btn" class="type-seg">Text</button>
          </div>
          <span class="toolbar-sep"></span>
          <button id="add-math-btn">+ Math</button>
          <button id="add-text-btn">+ Text</button>
          <button id="add-h1-btn">+ H1</button>
          <button id="add-h2-btn">+ H2</button>
          <button id="add-h3-btn">+ H3</button>
          <button id="add-break-btn">+ Break</button>
          <button id="add-graph-btn">+ Graph</button>
          <button id="add-calc-btn">+ Calc</button>
          <button id="add-image-btn">+ Image</button>
          <span class="toolbar-sep"></span>
          <button id="font-dec-btn" title="Decrease font size">A−</button>
          <span id="font-size-label" class="font-size-label">16px</span>
          <button id="font-inc-btn" title="Increase font size">A+</button>
          <span class="toolbar-sep"></span>
          <button id="toggle-source-btn">Source</button>
          <button id="toggle-preview-btn">Preview</button>
          <span class="toolbar-sep"></span>
          <button id="highlight-btn">Highlight</button>
          <button id="fill-color-btn" class="fill-color-swatch-btn" style="display:none" title="Fill color"></button>
        </div>
        <div class="toolbar" id="graph-toolbar" style="display:none">
          <button id="graph-add-expr-btn">+ Expression</button>
          <span class="toolbar-sep"></span>
          <button id="graph-toggle-source-btn">Hide Source</button>
          <button id="graph-toggle-preview-btn">Hide Preview</button>
          <span class="toolbar-sep"></span>
          <label class="graph-crop-label"><input type="checkbox" id="graph-crop-checkbox"> Crop</label>
          <span class="toolbar-sep"></span>
          <button id="graph-done-btn">Done Editing</button>
        </div>
      </div>
      <div id="box-list"></div>
      <div id="graph-editor-content">
        <div id="graph-expr-list"></div>
        <div id="graph-size-controls">
          <label>W <input type="number" id="graph-width-input" min="100" max="2000" step="10" value="600"></label>
          <label>H <input type="number" id="graph-height-input" min="100" max="2000" step="10" value="400"></label>
        </div>
      </div>
    </div>
    <div id="divider2"></div>
    <div id="preview-panel">
      <div class="panel-header">
        <span>Preview</span>
        <div class="toolbar">
          <button id="preview-zoom-out-btn">−</button>
          <span id="preview-zoom-label" class="font-size-label">100%</span>
          <button id="preview-zoom-in-btn">+</button>
          <span class="toolbar-sep"></span>
          <button id="download-pdf-btn">Download PDF</button>
        </div>
      </div>
      <div id="preview-content"></div>
    </div>
  </div>
  <script src="gl_util.js"></script>
  <script src="gpuimage.js"></script>
  <script src="math.js"></script>
  <script src="graph.js"></script>
  <script src="expr-row.js"></script>
  <script src="script.js"></script>
  <script src="graph-ui.js"></script>
  <script src="preview.js"></script>
</body>
</html>
